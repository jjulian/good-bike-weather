name: testing

on:
  schedule:
    - cron: '*/15 * * * *' # hourly testing
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: default
    steps:
      - name: Extract domain from sender email
        id: email
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: echo "domain=${EMAIL_FROM#*@}" >> $GITHUB_OUTPUT
      - uses: brenden-hogan/resend-action@1c6593d705ce6230ac1ac32daccd0826045a8c8f
        with:
          api-key: '${{ secrets.RESEND_API_KEY }}'
          from-domain: '${{ steps.email.outputs.domain }}'
          sender: '${{ secrets.EMAIL_FROM }}'
          to-array: ${{ secrets.EMAIL_TO }}
          subject: 'Hello World'
          html: '<div style="font-family:sans-serif;max-width:400px;margin:0 auto;padding:20px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px"><h1 style="color:#fff;font-size:32px;margin:0 0 10px;text-shadow:2px 2px 4px rgba(0,0,0,0.2)">Hello World!</h1><p style="color:#e8e8ff;font-size:18px;margin:0">Greetings from your scheduled workflow</p></div>'
